<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login | LibraryMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body { background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%); min-height: 100vh;
            display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
        .login-card { background: white; border-radius: 20px; padding: 2.5rem 2rem;
            width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .brand { text-align: center; margin-bottom: 2rem; }
        .brand-icon { font-size: 3rem; color: #2563eb; }
        .brand-title { font-size: 1.6rem; font-weight: 700; color: #1e293b; }
        .brand-sub { color: #64748b; font-size: 0.9rem; }
        .form-control { border-radius: 10px; padding: 0.7rem 1rem; border: 1.5px solid #e2e8f0; }
        .form-control:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .btn-login { background: #2563eb; color: white; border: none; border-radius: 10px;
            padding: 0.75rem; font-weight: 600; font-size: 1rem; width: 100%; transition: all 0.2s; }
        .btn-login:hover { background: #1d4ed8; transform: translateY(-1px); }
        .credential-box { background: #f8fafc; border-radius: 12px; padding: 1rem;
            margin-top: 1.5rem; border: 1px solid #e2e8f0; }
        .credential-box h6 { font-size: 0.78rem; text-transform: uppercase;
            letter-spacing: 1px; color: #64748b; margin-bottom: 0.5rem; }
        .cred-row { display: flex; justify-content: space-between; font-size: 0.82rem;
            padding: 2px 0; color: #334155; }
        .cred-row span:last-child { font-family: monospace; color: #2563eb; }
        .input-icon { position: relative; }
        .input-icon i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
            color: #94a3b8; }
        .input-icon .form-control { padding-left: 2.2rem; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="brand">
        <div class="brand-icon"><i class="bi bi-book-half"></i></div>
        <div class="brand-title">LibraryMS</div>
        <div class="brand-sub">Library Management System</div>
    </div>

    <div th:if="${error}" class="alert alert-danger py-2 px-3 mb-3" style="border-radius:10px;font-size:0.88rem;">
        <i class="bi bi-exclamation-circle me-1"></i> <span th:text="${error}"></span>
    </div>
    <div th:if="${message}" class="alert alert-success py-2 px-3 mb-3" style="border-radius:10px;font-size:0.88rem;">
        <i class="bi bi-check-circle me-1"></i> <span th:text="${message}"></span>
    </div>

    <form th:action="@{/auth/login}" method="post">
        <div class="mb-3">
            <label class="form-label fw-semibold text-secondary" style="font-size:0.85rem;">Username</label>
            <div class="input-icon">
                <i class="bi bi-person"></i>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus/>
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label fw-semibold text-secondary" style="font-size:0.85rem;">Password</label>
            <div class="input-icon">
                <i class="bi bi-lock"></i>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required/>
            </div>
        </div>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn-login">
            <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
        </button>
    </form>

    <div class="credential-box">
        <h6><i class="bi bi-key me-1"></i>Demo Credentials</h6>
        <div class="cred-row"><span>Admin</span><span>admin / admin123</span></div>
        <div class="cred-row"><span>Librarian</span><span>librarian / lib123</span></div>
        <div class="cred-row"><span>Member</span><span>john / john123</span></div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
