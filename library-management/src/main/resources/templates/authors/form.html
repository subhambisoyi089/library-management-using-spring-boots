<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Author Form | LibraryMS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<style>
:root{--sidebar-width:240px;--brand-color:#1e3a5f;--accent:#2563eb}
body{background:#f0f4f8;min-height:100vh;font-family:'Segoe UI',sans-serif}
.sidebar{width:var(--sidebar-width);position:fixed;top:0;left:0;height:100vh;background:var(--brand-color);color:#fff;display:flex;flex-direction:column;z-index:1000}
.sidebar-brand{padding:1.5rem 1.2rem;border-bottom:1px solid rgba(255,255,255,.1);font-size:1.2rem;font-weight:700}
.sidebar-brand i{color:#60a5fa;margin-right:8px}
.sidebar-nav{padding:1rem 0;flex:1}
.sidebar-section{padding:.4rem 1rem;font-size:.68rem;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.4);margin-top:.5rem}
.sidebar-nav a{display:flex;align-items:center;gap:10px;padding:.6rem 1.2rem;color:rgba(255,255,255,.78);text-decoration:none;font-size:.9rem;border-left:3px solid transparent}
.sidebar-nav a:hover{background:rgba(255,255,255,.08);color:#fff;border-left-color:#60a5fa}
.sidebar-nav a i{width:18px;text-align:center}
.sidebar-footer{padding:1rem 1.2rem;border-top:1px solid rgba(255,255,255,.1)}
.sidebar-footer .user-name{font-weight:600;color:#fff;font-size:.9rem}
.sidebar-footer .user-info{font-size:.82rem;color:rgba(255,255,255,.6)}
.main-content{margin-left:var(--sidebar-width);padding:1.5rem 2rem}
.topbar{background:#fff;padding:.75rem 1.5rem;margin:-1.5rem -2rem 1.5rem;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between}
.topbar h1{font-size:1.2rem;font-weight:600;color:#1e293b;margin:0}
.card{border:none;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.card-header{background:#fff;border-bottom:1px solid #f1f5f9;font-weight:600;padding:1rem 1.25rem;border-radius:12px 12px 0 0!important}
.form-control,.form-select{border-radius:10px;border:1.5px solid #e2e8f0}
.form-control:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.btn-primary{background:var(--accent);border-color:var(--accent)}
</style>
</head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
    <div class="topbar">
        <h1 th:text="${author.id != null ? 'Edit Author' : 'Add Author'}">Author Form</h1>
        <a th:href="@{/authors}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Back</a>
    </div>
    <div class="card" style="max-width:600px;">
        <div class="card-header"><i class="bi bi-person-lines-fill me-2 text-primary"></i>Author Details</div>
        <div class="card-body">
            <form th:action="@{/authors/save}" th:object="${author}" method="post">
                <input type="hidden" th:field="*{id}"/>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">First Name <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{firstName}" class="form-control" required placeholder="First name"/>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Last Name <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{lastName}" class="form-control" required placeholder="Last name"/>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Email</label>
                        <input type="email" th:field="*{email}" class="form-control" placeholder="author@email.com"/>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Nationality</label>
                        <input type="text" th:field="*{nationality}" class="form-control" placeholder="e.g., British"/>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Biography</label>
                        <textarea th:field="*{biography}" class="form-control" rows="4" placeholder="Short bio..."></textarea>
                    </div>
                </div>
                <div class="mt-4 d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-circle me-1"></i> Save Author
                    </button>
                    <a th:href="@{/authors}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
