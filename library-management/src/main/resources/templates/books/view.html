<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Book Detail | LibraryMS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<style>
:root{--sidebar-width:240px;--brand-color:#1e3a5f;--accent:#2563eb}
body{background:#f0f4f8;min-height:100vh;font-family:'Segoe UI',sans-serif}
.sidebar{width:var(--sidebar-width);position:fixed;top:0;left:0;height:100vh;background:var(--brand-color);color:#fff;display:flex;flex-direction:column;z-index:1000;box-shadow:3px 0 15px rgba(0,0,0,.15)}
.sidebar-brand{padding:1.5rem 1.2rem;border-bottom:1px solid rgba(255,255,255,.1);font-size:1.2rem;font-weight:700}
.sidebar-brand i{color:#60a5fa;margin-right:8px}
.sidebar-nav{padding:1rem 0;flex:1}
.sidebar-section{padding:.4rem 1rem;font-size:.68rem;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.4);margin-top:.5rem}
.sidebar-nav a{display:flex;align-items:center;gap:10px;padding:.6rem 1.2rem;color:rgba(255,255,255,.78);text-decoration:none;font-size:.9rem;border-left:3px solid transparent;transition:all .2s}
.sidebar-nav a:hover{background:rgba(255,255,255,.08);color:#fff;border-left-color:#60a5fa}
.sidebar-nav a i{width:18px;text-align:center}
.sidebar-footer{padding:1rem 1.2rem;border-top:1px solid rgba(255,255,255,.1)}
.sidebar-footer .user-name{font-weight:600;color:#fff;font-size:.9rem}
.sidebar-footer .user-info{font-size:.82rem;color:rgba(255,255,255,.6)}
.main-content{margin-left:var(--sidebar-width);padding:1.5rem 2rem}
.topbar{background:#fff;padding:.75rem 1.5rem;margin:-1.5rem -2rem 1.5rem;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.topbar h1{font-size:1.2rem;font-weight:600;color:#1e293b;margin:0}
.card{border:none;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.card-header{background:#fff;border-bottom:1px solid #f1f5f9;font-weight:600;padding:1rem 1.25rem;border-radius:12px 12px 0 0!important}
.detail-label{font-size:.78rem;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8;font-weight:600;margin-bottom:2px}
.detail-value{font-size:.95rem;color:#1e293b;font-weight:500}
.table th{font-weight:600;font-size:.82rem;text-transform:uppercase;letter-spacing:.5px;color:#64748b;background:#f8fafc}
.table td{vertical-align:middle;font-size:.88rem}
.book-cover{background:linear-gradient(135deg,#2563eb,#7c3aed);border-radius:12px;width:120px;height:160px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:3rem}
.badge-available{background:#dcfce7;color:#166534}
.badge-unavailable{background:#fee2e2;color:#991b1b}
.badge-issued{background:#dbeafe;color:#1e40af}
.badge-returned{background:#f1f5f9;color:#475569}
.badge-overdue{background:#fee2e2;color:#991b1b}
</style>
</head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
    <div class="topbar">
        <h1><i class="bi bi-journal-text me-2 text-primary"></i>Book Detail</h1>
        <div class="d-flex gap-2">
            <a th:href="@{/books/edit/{id}(id=${book.id})}" class="btn btn-outline-secondary btn-sm"
               sec:authorize="hasAnyRole('ADMIN','LIBRARIAN')"><i class="bi bi-pencil me-1"></i>Edit</a>
            <a th:href="@{/books/issue(bookId=${book.id})}" class="btn btn-success btn-sm"
               sec:authorize="hasAnyRole('ADMIN','LIBRARIAN')"
               th:classappend="${!book.available} ? 'disabled'">
                <i class="bi bi-box-arrow-in-right me-1"></i>Issue
            </a>
            <a th:href="@{/books}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Back</a>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-lg-4">
            <div class="card">
                <div class="card-body text-center p-4">
                    <div class="book-cover mx-auto mb-3"><i class="bi bi-book"></i></div>
                    <h5 class="fw-bold mb-1" th:text="${book.title}"></h5>
                    <div class="text-muted small mb-3">
                        <span th:each="a, ai : ${book.authors}">
                            <span th:text="${a.fullName}"></span><span th:unless="${ai.last}">, </span>
                        </span>
                    </div>
                    <span th:if="${book.availableCopies > 0}"
                          class="badge badge-available px-3 py-2 fs-6"
                          th:text="${book.availableCopies} + ' of ' + ${book.totalCopies} + ' available'"></span>
                    <span th:unless="${book.availableCopies > 0}"
                          class="badge badge-unavailable px-3 py-2 fs-6">Not Available</span>
                </div>
            </div>
        </div>
        <div class="col-lg-8">
            <div class="card mb-3">
                <div class="card-header"><i class="bi bi-info-circle me-2 text-primary"></i>Book Information</div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <div class="detail-label">ISBN</div>
                            <div class="detail-value" th:text="${book.isbn}">—</div>
                        </div>
                        <div class="col-md-6">
                            <div class="detail-label">Category</div>
                            <div class="detail-value" th:text="${book.category}">—</div>
                        </div>
                        <div class="col-md-6">
                            <div class="detail-label">Publisher</div>
                            <div class="detail-value" th:text="${book.publisher}">—</div>
                        </div>
                        <div class="col-md-6">
                            <div class="detail-label">Published Date</div>
                            <div class="detail-value"
                                 th:text="${book.publishedDate != null ? #temporals.format(book.publishedDate,'dd MMM yyyy') : '—'}"></div>
                        </div>
                        <div class="col-md-4">
                            <div class="detail-label">Language</div>
                            <div class="detail-value" th:text="${book.language ?: '—'}"></div>
                        </div>
                        <div class="col-md-4">
                            <div class="detail-label">Shelf Location</div>
                            <div class="detail-value" th:text="${book.shelfLocation ?: '—'}"></div>
                        </div>
                        <div class="col-md-4">
                            <div class="detail-label">Total Copies</div>
                            <div class="detail-value" th:text="${book.totalCopies}"></div>
                        </div>
                        <div class="col-12" th:if="${book.description}">
                            <div class="detail-label">Description</div>
                            <div class="detail-value text-muted small" th:text="${book.description}"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card" sec:authorize="hasAnyRole('ADMIN','LIBRARIAN')">
                <div class="card-header"><i class="bi bi-clock-history me-2 text-primary"></i>Issue History</div>
                <div class="card-body p-0">
                    <table class="table mb-0">
                        <thead>
                        <tr>
                            <th class="ps-3">Member</th>
                            <th>Issue Date</th>
                            <th>Due Date</th>
                            <th>Return Date</th>
                            <th>Status</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="ir : ${issueHistory}">
                            <td class="ps-3" th:text="${ir.user.fullName}"></td>
                            <td th:text="${#temporals.format(ir.issueDate,'dd MMM yyyy')}"></td>
                            <td th:text="${#temporals.format(ir.dueDate,'dd MMM yyyy')}"></td>
                            <td th:text="${ir.returnDate != null ? #temporals.format(ir.returnDate,'dd MMM yyyy') : '—'}"></td>
                            <td>
                                <span th:if="${ir.status.name()=='ISSUED'}" class="badge badge-issued">Issued</span>
                                <span th:if="${ir.status.name()=='RETURNED'}" class="badge badge-returned">Returned</span>
                                <span th:if="${ir.status.name()=='OVERDUE'}" class="badge badge-overdue">Overdue</span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(issueHistory)}">
                            <td colspan="5" class="text-center text-muted py-3">No issue history</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
