<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<div th:fragment="sidebar" class="sidebar">
    <div class="sidebar-brand"><i class="bi bi-book-half"></i> LibraryMS</div>
    <nav class="sidebar-nav">
        <div class="sidebar-section">Main</div>
        <a th:href="@{/dashboard}"><i class="bi bi-grid-1x2"></i> Dashboard</a>
        <div class="sidebar-section">Catalogue</div>
        <a th:href="@{/books}"><i class="bi bi-journal-bookmark"></i> Books</a>
        <a th:href="@{/authors}"><i class="bi bi-person-lines-fill"></i> Authors</a>
        <div sec:authorize="hasAnyRole('ADMIN','LIBRARIAN')">
            <div class="sidebar-section">Circulation</div>
            <a th:href="@{/issues}"><i class="bi bi-arrow-left-right"></i> Issue Records</a>
            <a th:href="@{/books/issue}"><i class="bi bi-box-arrow-in-right"></i> Issue a Book</a>
        </div>
        <div sec:authorize="hasAnyRole('ADMIN','LIBRARIAN')">
            <div class="sidebar-section">Members</div>
            <a th:href="@{/users}"><i class="bi bi-people"></i> Members</a>
        </div>
        <div sec:authorize="hasRole('MEMBER')">
            <div class="sidebar-section">My Library</div>
            <a th:href="@{/users/profile}"><i class="bi bi-person-circle"></i> My Profile</a>
        </div>
    </nav>
    <div class="sidebar-footer">
        <div class="user-name" sec:authentication="name">username</div>
        <div class="user-info" sec:authorize="hasRole('ADMIN')"><i class="bi bi-shield-check"></i> Administrator</div>
        <div class="user-info" sec:authorize="hasRole('LIBRARIAN')"><i class="bi bi-person-badge"></i> Librarian</div>
        <div class="user-info" sec:authorize="hasRole('MEMBER')"><i class="bi bi-person"></i> Member</div>
        <a th:href="@{/auth/logout}" class="btn btn-sm btn-outline-light mt-2 w-100">
            <i class="bi bi-box-arrow-left"></i> Logout
        </a>
    </div>
</div>
</body>
</html>
