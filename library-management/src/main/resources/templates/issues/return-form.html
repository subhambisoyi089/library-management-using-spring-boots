<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Return Book | LibraryMS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<style>
:root{--sidebar-width:240px;--brand-color:#1e3a5f;--accent:#2563eb}
body{background:#f0f4f8;min-height:100vh;font-family:'Segoe UI',sans-serif}
.sidebar{width:var(--sidebar-width);position:fixed;top:0;left:0;height:100vh;background:var(--brand-color);color:#fff;display:flex;flex-direction:column;z-index:1000;box-shadow:3px 0 15px rgba(0,0,0,.15)}
.sidebar-brand{padding:1.5rem 1.2rem;border-bottom:1px solid rgba(255,255,255,.1);font-size:1.2rem;font-weight:700}
.sidebar-brand i{color:#60a5fa;margin-right:8px}
.sidebar-nav{padding:1rem 0;flex:1}
.sidebar-section{padding:.4rem 1rem;font-size:.68rem;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.4);margin-top:.5rem}
.sidebar-nav a{display:flex;align-items:center;gap:10px;padding:.6rem 1.2rem;color:rgba(255,255,255,.78);text-decoration:none;font-size:.9rem;border-left:3px solid transparent;transition:all .2s}
.sidebar-nav a:hover{background:rgba(255,255,255,.08);color:#fff;border-left-color:#60a5fa}
.sidebar-nav a i{width:18px;text-align:center}
.sidebar-footer{padding:1rem 1.2rem;border-top:1px solid rgba(255,255,255,.1)}
.sidebar-footer .user-name{font-weight:600;color:#fff;font-size:.9rem}
.sidebar-footer .user-info{font-size:.82rem;color:rgba(255,255,255,.6)}
.main-content{margin-left:var(--sidebar-width);padding:1.5rem 2rem}
.topbar{background:#fff;padding:.75rem 1.5rem;margin:-1.5rem -2rem 1.5rem;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.topbar h1{font-size:1.2rem;font-weight:600;color:#1e293b;margin:0}
.card{border:none;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.card-header{background:#fff;border-bottom:1px solid #f1f5f9;font-weight:600;padding:1rem 1.25rem;border-radius:12px 12px 0 0!important}
.form-control,.form-select{border-radius:10px;border:1.5px solid #e2e8f0;padding:.65rem 1rem}
.form-control:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.btn-primary{background:var(--accent);border-color:var(--accent)}
.detail-row{display:flex;justify-content:space-between;padding:.4rem 0;border-bottom:1px solid #f1f5f9;font-size:.9rem}
.detail-row:last-child{border-bottom:none}
.detail-row .label{color:#64748b;font-weight:500}
.detail-row .value{font-weight:600;color:#1e293b}
.overdue-alert{background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:1rem;color:#991b1b}
</style>
</head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
    <div class="topbar">
        <h1><i class="bi bi-box-arrow-left me-2 text-warning"></i>Return Book</h1>
        <a th:href="@{/issues}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Back</a>
    </div>

    <div class="row g-3" th:if="${issue != null}">
        <div class="col-lg-5">
            <div class="card mb-3">
                <div class="card-header"><i class="bi bi-receipt me-2 text-primary"></i>Issue Details</div>
                <div class="card-body">
                    <div class="detail-row">
                        <span class="label">Book</span>
                        <span class="value" th:text="${issue.book.title}"></span>
                    </div>
                    <div class="detail-row">
                        <span class="label">Member</span>
                        <span class="value" th:text="${issue.user.fullName}"></span>
                    </div>
                    <div class="detail-row">
                        <span class="label">Member ID</span>
                        <span class="value"><code th:text="${issue.user.memberId}"></code></span>
                    </div>
                    <div class="detail-row">
                        <span class="label">Issue Date</span>
                        <span class="value" th:text="${#temporals.format(issue.issueDate,'dd MMM yyyy')}"></span>
                    </div>
                    <div class="detail-row">
                        <span class="label">Due Date</span>
                        <span class="value" th:text="${#temporals.format(issue.dueDate,'dd MMM yyyy')}"
                              th:class="${issue.overdue} ? 'value text-danger' : 'value'"></span>
                    </div>
                    <div class="detail-row" th:if="${issue.issuedBy != null}">
                        <span class="label">Issued By</span>
                        <span class="value" th:text="${issue.issuedBy}"></span>
                    </div>
                </div>
            </div>

            <div class="overdue-alert" th:if="${issue.overdue}">
                <i class="bi bi-exclamation-triangle me-2"></i>
                <strong>Overdue!</strong> This book is
                <strong th:text="${issue.daysOverdue}"></strong> day(s) late.
                Fine: <strong th:text="'₹' + (${issue.daysOverdue} * 2)"></strong>
            </div>
        </div>

        <div class="col-lg-7">
            <div class="card">
                <div class="card-header"><i class="bi bi-box-arrow-left me-2 text-warning"></i>Process Return</div>
                <div class="card-body">
                    <form th:action="@{/books/return/{id}(id=${issue.id})}" method="post">
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Return Date</label>
                            <input type="text" class="form-control" value="Today" readonly
                                   style="background:#f8fafc;color:#64748b"/>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Remarks (optional)</label>
                            <textarea name="remarks" class="form-control" rows="3"
                                      placeholder="Any notes about the book condition..."></textarea>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-warning">
                                <i class="bi bi-check-circle me-1"></i> Confirm Return
                            </button>
                            <a th:href="@{/issues}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
