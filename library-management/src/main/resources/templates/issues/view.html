<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Issue Record | LibraryMS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<style>
:root{--sidebar-width:240px;--brand-color:#1e3a5f;--accent:#2563eb}
body{background:#f0f4f8;min-height:100vh;font-family:'Segoe UI',sans-serif}
.sidebar{width:var(--sidebar-width);position:fixed;top:0;left:0;height:100vh;background:var(--brand-color);color:#fff;display:flex;flex-direction:column;z-index:1000;box-shadow:3px 0 15px rgba(0,0,0,.15)}
.sidebar-brand{padding:1.5rem 1.2rem;border-bottom:1px solid rgba(255,255,255,.1);font-size:1.2rem;font-weight:700}
.sidebar-brand i{color:#60a5fa;margin-right:8px}
.sidebar-nav{padding:1rem 0;flex:1}
.sidebar-section{padding:.4rem 1rem;font-size:.68rem;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.4);margin-top:.5rem}
.sidebar-nav a{display:flex;align-items:center;gap:10px;padding:.6rem 1.2rem;color:rgba(255,255,255,.78);text-decoration:none;font-size:.9rem;border-left:3px solid transparent;transition:all .2s}
.sidebar-nav a:hover{background:rgba(255,255,255,.08);color:#fff;border-left-color:#60a5fa}
.sidebar-nav a i{width:18px;text-align:center}
.sidebar-footer{padding:1rem 1.2rem;border-top:1px solid rgba(255,255,255,.1)}
.sidebar-footer .user-name{font-weight:600;color:#fff;font-size:.9rem}
.sidebar-footer .user-info{font-size:.82rem;color:rgba(255,255,255,.6)}
.main-content{margin-left:var(--sidebar-width);padding:1.5rem 2rem}
.topbar{background:#fff;padding:.75rem 1.5rem;margin:-1.5rem -2rem 1.5rem;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.topbar h1{font-size:1.2rem;font-weight:600;color:#1e293b;margin:0}
.card{border:none;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.card-header{background:#fff;border-bottom:1px solid #f1f5f9;font-weight:600;padding:1rem 1.25rem;border-radius:12px 12px 0 0!important}
.detail-label{font-size:.78rem;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8;font-weight:600;margin-bottom:2px}
.detail-value{font-size:.95rem;color:#1e293b;font-weight:500}
</style>
</head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
    <div class="topbar">
        <h1><i class="bi bi-receipt me-2 text-primary"></i>Issue Record Detail</h1>
        <div class="d-flex gap-2">
            <a th:href="@{/books/return/{id}(id=${issue.id})}" class="btn btn-warning btn-sm"
               th:if="${issue != null and issue.status.name()=='ISSUED'}"
               sec:authorize="hasAnyRole('ADMIN','LIBRARIAN')">
                <i class="bi bi-box-arrow-left me-1"></i>Return
            </a>
            <a th:href="@{/issues}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Back</a>
        </div>
    </div>

    <div class="card" style="max-width:700px;" th:if="${issue != null}">
        <div class="card-header">
            <i class="bi bi-receipt me-2 text-primary"></i>
            Record #<span th:text="${issue.id}"></span>
            &nbsp;
            <span th:if="${issue.status.name()=='ISSUED'}" class="badge" style="background:#dbeafe;color:#1e40af;">Issued</span>
            <span th:if="${issue.status.name()=='RETURNED'}" class="badge bg-secondary">Returned</span>
            <span th:if="${issue.status.name()=='OVERDUE'}" class="badge bg-danger">Overdue</span>
        </div>
        <div class="card-body">
            <div class="row g-4">
                <div class="col-md-6">
                    <div class="detail-label">Book Title</div>
                    <div class="detail-value">
                        <a th:href="@{/books/{id}(id=${issue.book.id})}" class="text-decoration-none"
                           th:text="${issue.book.title}"></a>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="detail-label">ISBN</div>
                    <div class="detail-value" th:text="${issue.book.isbn}"></div>
                </div>
                <div class="col-md-6">
                    <div class="detail-label">Member Name</div>
                    <div class="detail-value">
                        <a th:href="@{/users/{id}(id=${issue.user.id})}" class="text-decoration-none"
                           th:text="${issue.user.fullName}"></a>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="detail-label">Member ID</div>
                    <div class="detail-value"><code th:text="${issue.user.memberId}"></code></div>
                </div>
                <div class="col-md-4">
                    <div class="detail-label">Issue Date</div>
                    <div class="detail-value" th:text="${#temporals.format(issue.issueDate,'dd MMM yyyy')}"></div>
                </div>
                <div class="col-md-4">
                    <div class="detail-label">Due Date</div>
                    <div class="detail-value" th:text="${#temporals.format(issue.dueDate,'dd MMM yyyy')}"
                         th:class="${issue.overdue} ? 'detail-value text-danger fw-bold' : 'detail-value'"></div>
                </div>
                <div class="col-md-4">
                    <div class="detail-label">Return Date</div>
                    <div class="detail-value"
                         th:text="${issue.returnDate != null ? #temporals.format(issue.returnDate,'dd MMM yyyy') : '—'}"></div>
                </div>
                <div class="col-md-6" th:if="${issue.issuedBy != null}">
                    <div class="detail-label">Issued By</div>
                    <div class="detail-value" th:text="${issue.issuedBy}"></div>
                </div>
                <div class="col-md-6" th:if="${issue.returnedTo != null}">
                    <div class="detail-label">Returned To</div>
                    <div class="detail-value" th:text="${issue.returnedTo}"></div>
                </div>
                <div class="col-md-4" th:if="${issue.fineAmount > 0}">
                    <div class="detail-label">Fine Amount</div>
                    <div class="detail-value text-danger fw-bold" th:text="'₹' + ${issue.fineAmount}"></div>
                </div>
                <div class="col-12" th:if="${issue.remarks != null and !#strings.isEmpty(issue.remarks)}">
                    <div class="detail-label">Remarks</div>
                    <div class="detail-value text-muted" th:text="${issue.remarks}"></div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
