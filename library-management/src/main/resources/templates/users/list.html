<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Users | LibraryMS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<style>
:root{--sidebar-width:240px;--brand-color:#1e3a5f;--accent:#2563eb}
body{background:#f0f4f8;min-height:100vh;font-family:'Segoe UI',sans-serif}
.sidebar{width:var(--sidebar-width);position:fixed;top:0;left:0;height:100vh;background:var(--brand-color);color:#fff;display:flex;flex-direction:column;z-index:1000;box-shadow:3px 0 15px rgba(0,0,0,.15)}
.sidebar-brand{padding:1.5rem 1.2rem;border-bottom:1px solid rgba(255,255,255,.1);font-size:1.2rem;font-weight:700}
.sidebar-brand i{color:#60a5fa;margin-right:8px}
.sidebar-nav{padding:1rem 0;flex:1}
.sidebar-section{padding:.4rem 1rem;font-size:.68rem;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.4);margin-top:.5rem}
.sidebar-nav a{display:flex;align-items:center;gap:10px;padding:.6rem 1.2rem;color:rgba(255,255,255,.78);text-decoration:none;font-size:.9rem;border-left:3px solid transparent;transition:all .2s}
.sidebar-nav a:hover{background:rgba(255,255,255,.08);color:#fff;border-left-color:#60a5fa}
.sidebar-nav a i{width:18px;text-align:center}
.sidebar-footer{padding:1rem 1.2rem;border-top:1px solid rgba(255,255,255,.1)}
.sidebar-footer .user-name{font-weight:600;color:#fff;font-size:.9rem}
.sidebar-footer .user-info{font-size:.82rem;color:rgba(255,255,255,.6)}
.main-content{margin-left:var(--sidebar-width);padding:1.5rem 2rem}
.topbar{background:#fff;padding:.75rem 1.5rem;margin:-1.5rem -2rem 1.5rem;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.topbar h1{font-size:1.2rem;font-weight:600;color:#1e293b;margin:0}
.card{border:none;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.card-header{background:#fff;border-bottom:1px solid #f1f5f9;font-weight:600;padding:1rem 1.25rem;border-radius:12px 12px 0 0!important}
.table th{font-weight:600;font-size:.82rem;text-transform:uppercase;letter-spacing:.5px;color:#64748b;background:#f8fafc}
.table td{vertical-align:middle;font-size:.88rem}
.btn-primary{background:var(--accent);border-color:var(--accent)}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;color:#fff}
</style>
</head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
    <div class="topbar">
        <h1><i class="bi bi-people me-2 text-primary"></i>User Management</h1>
        <a th:href="@{/users/new}" class="btn btn-primary btn-sm" sec:authorize="hasRole('ADMIN')">
            <i class="bi bi-person-plus me-1"></i> Add User
        </a>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card">
        <div class="card-header" th:text="'All Users (' + ${#lists.size(users)} + ')'">Users</div>
        <div class="card-body p-0">
            <table class="table mb-0">
                <thead>
                <tr>
                    <th class="ps-3">#</th>
                    <th>User</th>
                    <th>Username</th>
                    <th>Member ID</th>
                    <th>Email</th>
                    <th>Roles</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user, iter : ${users}">
                    <td class="ps-3 text-muted" th:text="${iter.count}"></td>
                    <td>
                        <div class="d-flex align-items-center gap-2">
                            <div class="avatar"
                                 th:style="'background:' + (${iter.index % 4 == 0} ? '#2563eb' : ${iter.index % 4 == 1} ? '#7c3aed' : ${iter.index % 4 == 2} ? '#059669' : '#d97706')"
                                 th:text="${#strings.substring(user.fullName,0,1)}"></div>
                            <span class="fw-semibold" th:text="${user.fullName}"></span>
                        </div>
                    </td>
                    <td class="text-muted" th:text="${user.username}"></td>
                    <td><code th:text="${user.memberId}"></code></td>
                    <td class="text-muted small" th:text="${user.email}"></td>
                    <td>
                        <span th:each="role : ${user.roles}"
                              th:text="${#strings.replace(role.name,'ROLE_','')}"
                              th:class="${role.name=='ROLE_ADMIN'} ? 'badge bg-danger me-1' : (${role.name=='ROLE_LIBRARIAN'} ? 'badge bg-warning text-dark me-1' : 'badge bg-info text-dark me-1')"></span>
                    </td>
                    <td>
                        <span th:if="${user.enabled}" class="badge" style="background:#dcfce7;color:#166534;">Active</span>
                        <span th:unless="${user.enabled}" class="badge" style="background:#fee2e2;color:#991b1b;">Disabled</span>
                    </td>
                    <td>
                        <div class="d-flex gap-1">
                            <a th:href="@{/users/{id}(id=${user.id})}" class="btn btn-sm btn-outline-info" title="View">
                                <i class="bi bi-eye"></i>
                            </a>
                            <a th:href="@{/users/edit/{id}(id=${user.id})}" class="btn btn-sm btn-outline-secondary"
                               sec:authorize="hasRole('ADMIN')" title="Edit">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/users/toggle/{id}(id=${user.id})}" class="btn btn-sm btn-outline-warning"
                               sec:authorize="hasRole('ADMIN')" title="Toggle Status">
                                <i class="bi bi-toggle-on"></i>
                            </a>
                            <a th:href="@{/users/delete/{id}(id=${user.id})}" class="btn btn-sm btn-outline-danger"
                               sec:authorize="hasRole('ADMIN')" title="Delete"
                               onclick="return confirm('Delete this user?')">
                                <i class="bi bi-trash"></i>
                            </a>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="8" class="text-center text-muted py-4">No users found</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
